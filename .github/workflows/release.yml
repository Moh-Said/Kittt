name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .app
        run: ./scripts/build-app.sh

      - name: Create DMG
        run: |
          DMG="build/Kittt_${{ steps.version.outputs.version }}_macos_silicon.dmg"
          hdiutil create \
            -volname "Kittt" \
            -srcfolder build/Kittt.app \
            -ov \
            -format UDZO \
            "$DMG"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Kittt_${{ steps.version.outputs.version }}_macos_silicon.dmg
